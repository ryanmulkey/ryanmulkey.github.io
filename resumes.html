<!DOCTYPE html>
<html>
<head>
    <title>PDF Display</title>
    <style>
        body { margin: 0; padding: 0; }
        .pdf-container {
            width: 100vw; /* Viewport width */
            height: 100vh; /* Viewport height */
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="RyanMulkey_Resume.pdf" class="pdf-container"></iframe>
    <!-- Alternatively, use <embed> -->
    <!-- <embed src="path/to/your/document.pdf" type="application/pdf" class="pdf-container"> -->
</body>
</html>
